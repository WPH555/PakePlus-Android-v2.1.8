<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>海空智擎 AeroMarinX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f5f5f7; /* iOS Light Gray Background */
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none; /* Disable pull-to-refresh effect */
        user-select: none; /* Disable text selection like a real app */
        -webkit-user-select: none;
        -webkit-touch-callout: none; /* Disable long-press menu */
      }
      /* Hide scrollbar for clean UI */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      /* Safe Area support for notches */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .glass-dock {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-top: 1px solid rgba(0, 0, 0, 0.05);
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
      }
      /* Leaflet Custom Overrides */
      .leaflet-control-attribution {
        font-size: 8px !important;
        background: rgba(0,0,0,0.5) !important;
        color: #aaa !important;
        padding: 0 4px !important;
      }
      input, textarea {
        user-select: text !important;
        -webkit-user-select: text !important;
      }
    </style>
